name: tren_amdk
prompt: Tren Produk Air Minum Dalam Kemasan AMDK
intent: Count AMDK products by year across ERBA and ERLA.
sql: |
  SELECT EXTRACT(YEAR FROM tanggal) AS tahun, COUNT(DISTINCT nomor) AS jumlah_produk
  FROM (
    SELECT nomor, tanggal
    FROM warehouse.public.t_produk_3_erba
    WHERE jenis_pangan = '1401'
      AND tanggal IS NOT NULL
      AND status IN ('0999','0906','9999')
      AND jenis_permohonan IN ('301','305')
    UNION ALL
    SELECT nomor, tanggal
    FROM warehouse.public.t_produk_3_rilis_erla
    WHERE jenis_pangan IN ('651', '652', '655')
      AND tanggal IS NOT NULL
      AND status IN ('0099','0999','0906','9999')
      AND jenis_permohonan IN ('301','304','305')
  ) AS gabungan
  GROUP BY EXTRACT(YEAR FROM tanggal)
  ORDER BY tahun
notes:
  - AMDK = Air Minum Dalam Kemasan.
  - ERBA jenis_pangan '1401'; ERLA jenis_pangan ('651', '652', '655').
  - COUNT(DISTINCT nomor) prevents double-counting if nomor appears in both sources.
