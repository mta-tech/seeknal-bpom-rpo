name: tren_btp_skala_industri
prompt: Tren jumlah izin edar produk bahan tambahan pangan berdasarkan skala industri
intent: Count BTP NIEs grouped by skala industri name.
sql: |
  SELECT
    COALESCE(dd.deskripsi, 'Importir') AS skala_industri,
    SUM(sub.jumlah_izin_edar) AS jumlah_izin_edar
  FROM (
    SELECT skala_industri_nama,
           COUNT(DISTINCT nomor) AS jumlah_izin_edar
    FROM (
      SELECT ref.skala_industri_id AS skala_industri_nama, main.nomor
      FROM warehouse.public.t_btp_3_erba main
      LEFT JOIN warehouse.public.m_trader_rba ref ON main.trader_id = ref.trader_id
      WHERE main.tanggal IS NOT NULL
        AND main.status IN ('0999', '0906', '9999')
        AND main.jenis_permohonan IN ('301', '305')
      UNION ALL
      SELECT ref.skala_industri AS skala_industri_nama, main.nomor
      FROM warehouse.public.t_btp_3_erla main
      LEFT JOIN warehouse.public.m_trader_rla ref ON main.trader_id = ref.trader_id
      WHERE main.tanggal IS NOT NULL
      AND main.status IN ('0099', '0999', '0906', '9999')
      AND main.jenis_permohonan IN ('301', '304', '305')
    ) AS gabungan
    GROUP BY skala_industri_nama
  ) AS sub
  LEFT JOIN warehouse.public.data_dictionary dd
    ON dd.kategori = 'SKALA_INDUSTRI dan SKALA_INDUSTRI_ID'
    AND dd.kode = TRIM(COALESCE(sub.skala_industri_nama::text, ''))
  GROUP BY COALESCE(dd.deskripsi, 'Importir')
  ORDER BY jumlah_izin_edar DESC
notes:
  - m_trader_rba uses column skala_industri_id; m_trader_rla uses skala_industri.
  - LEFT JOIN preserves BTP records even when trader reference is missing.
  - Resolves scale codes via data_dictionary; NULL/empty values labeled as 'Importir'.
