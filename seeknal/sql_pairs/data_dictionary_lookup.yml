name: data_dictionary_lookup
prompt: Cari deskripsi untuk kode tertentu di data dictionary
intent: >
  Search for a specific code across all categories in data_dictionary.
  Use this when you know the code value but not the category.
sql: |
  SELECT kategori, kode, deskripsi
  FROM warehouse.public.data_dictionary
  WHERE kode = 'KODE_PLACEHOLDER'
  ORDER BY kategori
notes:
  - Replace KODE_PLACEHOLDER with the actual code to look up.
  - Returns all matching entries across categories.
  - Useful for resolving unknown codes without knowing the category first.
