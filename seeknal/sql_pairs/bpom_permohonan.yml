# SQL pairs for BPOM permohonan (application) queries
# Rules for counting permohonan:
# - Count unique produk_id values
# - Use all jenis_permohonan codes present
# - Filter by tanggal_bayar (must not be null)
# - Union across: t_produk_3_erba, t_btp_3_erba, t_produk_3_rilis_erla, t_btp_3_erla

- name: jumlah_permohonan_per_bulan
  prompt: Berapa jumlah permohonan per bulan
  intent: Count unique applications grouped by month of payment.
  sql: |
    SELECT COALESCE(TO_CHAR(DATE_TRUNC('month', tanggal_bayar), 'YYYY-MM'), 'TOTAL') AS bulan,
           COUNT(DISTINCT produk_id) AS jumlah_permohonan
    FROM (
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_produk_3_erba
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_btp_3_erba
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_produk_3_rilis_erla
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_btp_3_erla
    ) AS a
    WHERE jenis_permohonan IN ('301','302','303','304','305')
      AND tanggal_bayar >= DATE '2025-01-01'
      AND tanggal_bayar <= DATE '2025-12-31'
    GROUP BY GROUPING SETS (
      (DATE_TRUNC('month', tanggal_bayar)),
      ()
    )
    ORDER BY bulan
  notes:
    - Counts unique produk_id across all product and BTP tables.
    - Uses tanggal_bayar as the date filter; excludes records with null tanggal_bayar.
    - GROUPING SETS produces monthly rows plus a TOTAL row.
    - Adjust date range as needed for the specific question.

- name: jumlah_permohonan_total
  prompt: Berapa jumlah permohonan
  intent: Count total unique applications across all tables.
  sql: |
    SELECT COUNT(DISTINCT produk_id) AS jumlah_permohonan
    FROM (
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_produk_3_erba
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_btp_3_erba
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_produk_3_rilis_erla
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_btp_3_erla
    ) AS a
    WHERE jenis_permohonan IN ('301','302','303','304','305')
      AND tanggal_bayar IS NOT NULL
  notes:
    - Returns a single total count of unique applications.
    - tanggal_bayar must not be null.

- name: jumlah_permohonan_per_jenis
  prompt: Berapa jumlah permohonan berdasarkan jenis permohonan
  intent: Count applications grouped by jenis_permohonan code.
  sql: |
    SELECT jenis_permohonan,
           COUNT(DISTINCT produk_id) AS jumlah_permohonan
    FROM (
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_produk_3_erba
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_btp_3_erba
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_produk_3_rilis_erla
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_btp_3_erla
    ) AS a
    WHERE jenis_permohonan IN ('301','302','303','304','305')
      AND tanggal_bayar IS NOT NULL
    GROUP BY jenis_permohonan
    ORDER BY jenis_permohonan
  notes:
    - Groups by jenis_permohonan to show breakdown by application type.

- name: jumlah_permohonan_per_tahun
  prompt: Berapa jumlah permohonan per tahun
  intent: Count applications grouped by year of payment.
  sql: |
    SELECT EXTRACT(YEAR FROM tanggal_bayar) AS tahun,
           COUNT(DISTINCT produk_id) AS jumlah_permohonan
    FROM (
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_produk_3_erba
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_btp_3_erba
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_produk_3_rilis_erla
      UNION
      SELECT produk_id, tanggal_bayar, jenis_permohonan FROM warehouse.public.t_btp_3_erla
    ) AS a
    WHERE jenis_permohonan IN ('301','302','303','304','305')
      AND tanggal_bayar IS NOT NULL
    GROUP BY EXTRACT(YEAR FROM tanggal_bayar)
    ORDER BY tahun
  notes:
    - Uses EXTRACT(YEAR FROM tanggal_bayar) for PostgreSQL compatibility.
