name: jumlah_izin_edar_skala_industri
prompt: Jumlah Perusahaan yang memiliki Izin Edar berdasarkan skala industri
intent: Count all valid NIE across based on industrial scale.
sql: |
  SELECT
  "SKALA_INDUSTRI_ID",
  COUNT(DISTINCT "NOMOR") AS "JUMLAH_IZIN_EDAR"
    FROM (
      SELECT
      "ref"."SKALA_INDUSTRI_ID",
      "main"."NOMOR"
  FROM warehouse.public.t_produk_3_erba "main"
  LEFT JOIN warehouse.public.m_trader_rba "ref"
      ON "main"."TRADER_ID" = "ref"."TRADER_ID"
  WHERE "main"."TANGGAL" IS NOT NULL
    AND "main"."STATUS" IN ('0999', '0906', '9999')
    AND "main"."TANGGAL" >= '2018-01-01'
    AND "main"."JENIS_PERMOHONAN" IN ('301', '305')

  UNION ALL

  SELECT
      "ref"."SKALA_INDUSTRI" AS "SKALA_INDUSTRI_ID",
      "main"."NOMOR"
  FROM "warehouse.public.t_produk_3_rilis_erla" "main"
  LEFT JOIN "warehouse.public.m_trader_rla" "ref"
      ON "main"."TRADER_ID" = "ref"."TRADER_ID"
  WHERE "main"."TANGGAL" IS NOT NULL
    AND "main"."STATUS" IN ('0099', '0999', '0906', '9999')
    AND "main"."TANGGAL" >= '2018-01-01'
    AND "main"."JENIS_PERMOHONAN" IN ('301', '304', '305')
      ) AS "GABUNGAN"
      GROUP BY "SKALA_INDUSTRI_ID"
      ORDER BY "SKALA_INDUSTRI_ID";
notes:
  - Aggregates all valid NIEs regardless of risk category.
  - ERBA uses m_trader_rba.skala_industri_id; ERLA uses m_trader_rla.skala_industri.
