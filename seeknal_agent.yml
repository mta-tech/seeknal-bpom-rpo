mode:
  default: auto
locale: {}
agent: {}
sources:
  warehouse:
    source_kind: connected
    source_type: database
    connector: postgresql
    namespace: warehouse
    access: read_only
    role: business_source_of_truth
    priority: 100
    context_sync:
      enabled: true
      refresh_policy: manual
      stale_after_hours: 24
      templates:
      - overview
      - columns
      - relationships
      - profiling
    dsn_env: WAREHOUSE_URL
